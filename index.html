<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/e/e6/Windows_11_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 12 Fanmade</title>
    <!-- Use authentic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- Boot Screen -->
    <div id="boot-screen" class="boot-screen">
      <div class="boot-logo">
        <div class="win-logo-grid">
          <div class="win-square win-square-1"></div>
          <div class="win-square win-square-2"></div>
          <div class="win-square win-square-3"></div>
          <div class="win-square win-square-4"></div>
        </div>
      </div>
      <div class="boot-spinner"></div>
    </div>

    <!-- Desktop -->
    <main id="desktop" class="desktop hidden">
      <!-- Desktop Icons Container (Rendered by JS) -->
      <div class="desktop-icons" id="desktop-icons"></div>

      <!-- Windows Container -->
      <div id="windows-container"></div>

      <!-- Start Menu -->
      <div id="start-menu" class="start-menu">
        <div class="start-search">
          <i class="fa-solid fa-search"></i>
          <input type="text" placeholder="Type here to search apps, files, and settings">
        </div>
        
        <div class="start-pinned">
          <div class="start-pinned-header">
            <h3>Pinned</h3>
            <span>All apps <i class="fa-solid fa-chevron-right" style="font-size:10px;"></i></span>
          </div>
          <!-- Pinned Apps Container (Rendered by JS) -->
          <div class="pinned-apps" id="pinned-apps"></div>
        </div>

        <div class="start-bottom">
          <div class="user-profile">
            <img class="user-avatar" src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" alt="Admin">
            <span>Admin</span>
          </div>
          <div class="power-btn" title="Power">
            <i class="fa-solid fa-power-off"></i>
          </div>
        </div>
      </div>

      <!-- Taskbar -->
      <div class="taskbar">
        <div class="taskbar-left">
          <div class="weather-widget" title="[add your info here]">
            <i class="fa-solid fa-cloud-sun" style="color:#ffb800; font-size:16px;"></i>
            <span>34°C [add your info here]</span>
          </div>
        </div>

        <div class="taskbar-center">
          <div id="start-btn" class="taskbar-icon start-btn" title="Start">
            <div class="win-logo-grid small">
              <div class="win-square win-square-1"></div>
              <div class="win-square win-square-2"></div>
              <div class="win-square win-square-3"></div>
              <div class="win-square win-square-4"></div>
            </div>
          </div>
          <!-- Taskbar Icons Container (Rendered by JS) -->
          <div id="taskbar-icons" style="display: flex; gap: 4px;"></div>
        </div>

        <div class="taskbar-right">
          <div class="system-tray" id="system-tray">
            <div id="tray-arrow" class="tray-icon" title="Show open apps" style="display:flex; align-items:center; justify-content:center; width:24px; transition: transform 0.2s;"><i class="fa-solid fa-chevron-up"></i></div>
            <div id="tray-wifi" class="tray-icon" title="AI Model Status" style="display:flex; align-items:center; justify-content:center; width:24px;"><i class="fa-solid fa-wifi"></i></div>
            <div id="tray-audio" class="tray-icon" title="Volume & Brightness" style="display:flex; align-items:center; justify-content:center; width:24px;"><i class="fa-solid fa-volume-high"></i></div>
            <div id="tray-battery" class="tray-icon" title="Battery" style="display:flex; align-items:center; justify-content:center; gap:4px; padding:0 5px;"><i class="fa-solid fa-battery-full" id="battery-icon"></i> <span id="battery-text" style="font-size:10px;">100%</span></div>
          </div>
          <div class="datetime">
            <div id="time" class="time">10:00 AM</div>
            <div id="date" class="date">10/24/2023</div>
          </div>
        </div>
      </div>

      <!-- Quick Settings Flyout -->
      <div id="quick-settings-flyout" class="flyout hidden">
        <div class="flyout-section">
          <i class="fa-solid fa-volume-high"></i>
          <input type="range" id="volume-slider" min="0" max="100" value="50">
          <span id="volume-val">50</span>
        </div>
        <div class="flyout-section">
          <i class="fa-solid fa-sun"></i>
          <input type="range" id="brightness-slider" min="10" max="100" value="100">
          <span id="brightness-val">100</span>
        </div>
      </div>

      <!-- Open Apps Flyout -->
      <div id="open-apps-flyout" class="flyout hidden">
        <div class="flyout-header">Open Apps</div>
        <div id="open-apps-list"></div>
      </div>

      <!-- Wifi Flyout -->
      <div id="wifi-flyout" class="flyout hidden">
        <div class="flyout-header">AI Model Status</div>
        <div style="font-size: 13px; margin-top: 10px; display:flex; align-items:center;">
           <i class="fa-solid fa-wifi" style="margin-right: 10px; font-size:16px;"></i>
           <span>Llama 3 8B</span>
        </div>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
